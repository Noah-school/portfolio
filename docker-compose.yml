services:
  portfolio:
    build:
      context: .
      dockerfile: dockerfile
    container_name: portfolio-app
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    volumes:
      - ./dist:/usr/share/nginx/html
      - ./api:/usr/share/nginx/html/api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

